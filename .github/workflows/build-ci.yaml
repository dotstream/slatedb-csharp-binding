name: Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Generate bindings
        shell: bash
        run: generate-bindings.sh 0.10.1 release

      - name: Run dotnet tests
        shell: bash
        run: |
          cd src/SlateDbUnitTests
          dotnet test --verbosity normal

      - name: Upload native libs artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-libs-${{ matrix.os }}
          path: src/SlateDb/runtimes
          retention-days: 1