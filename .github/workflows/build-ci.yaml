name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Check for BOM
        run: |
          if grep -RIl $'\xEF\xBB\xBF' rust/slatedb-ffi/src/ > /dev/null; then
            echo "BOM found!"
            grep -RIl $'\xEF\xBB\xBF' rust/slatedb-ffi/src/
            exit 1
          else
            echo "No BOM found."
          fi
      - name: Check for CRLF
        run: |
          if grep -RIl $'\r' rust/slatedb-ffi/src/ > /dev/null; then
            echo "CRLF found!"
            grep -RIl $'\r' rust/slatedb-ffi/src/
            exit 1
          else
            echo "No CRLF found."
          fi
      - run: ./generate-binding.sh
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.200'
      - name: Run dotnet tests
        shell: bash
        run: |
          cd src/SlateDbUnitTests
          dotnet test --verbosity normal