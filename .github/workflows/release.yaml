name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            targets: linux + windows
          - os: macos-latest
            targets: macOS
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      
      - uses: dtolnay/rust-toolchain@nightly
      - uses: goto-bus-stop/setup-zig@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.4"

      - name: Make script executable
        run: |
          chmod +x ./generate-binding.sh && chmod +x ./get-slatedb-c-bindings.sh

      - run: cargo install cargo-zigbuild

      - name: Generate bindings
        shell: bash
        run: ./generate-binding.sh ${{ steps.version.outputs.VERSION }} all

      - name: Run dotnet tests
        shell: bash
        run: |
          cd src/SlateDbUnitTests
          dotnet test --verbosity normal

      - name: Upload native libs artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-libs-${{ matrix.os }}
          path: src/SlateDb/runtimes
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: src/SlateDb/runtimes/
          pattern: native-*
          merge-multiple: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet build slatedb-csharp-binding.sln -c Release

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - run: dotnet pack src/SlateDb/SlateDb.csproj -c Release -p:PackageVersion=${{ steps.version.outputs.VERSION }} -o ./artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.nupkg

      - run: dotnet nuget push ./artifacts/*.nupkg -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json